; ==========================================================
; SIMULATION LAB 4: COLLISION RESPONSE — Q1 + Q5
; ==========================================================
;
; Q1 — Ball vs Fixed Object (impulse with infinite-mass body):
;   Test 1: MovingBallQ1 travels in +Z and bounces off static FixedSphereQ1.
;           Demonstrates impulse reflected along sphere-sphere collision normal.
;   Test 2: RampBallQ1 falls under gravity with x-velocity and ricochets off
;           TiltedRamp. Shows impulse direction set by plane normal (not world-up).
;
; Q5 — Elasticity side-by-side:
;   Three balls dropped from the same height with e=0, e=0.5, e=1.0.
;   Ball_e00: zero restitution — hits floor and stops dead.
;   Ball_e05: partial restitution — bounces to ~25% of drop height (e^2=0.25).
;   Ball_e10: unit restitution — bounces back to original drop height.
;
; Q4/Q5 GUI controls are in Simulation menu -> "Lab 4 — Collision Response".

; --- Resource Registry ---
[Texture:White]
Path = ./textures/white.png
[Texture:Black]
Path = ./textures/black.png
[Texture:Placeholder]
Path = ./textures/matte_rough.png
[Texture:Matte]
Path = ./textures/matte_rough.png

; --- Material ---
[Material:PhysicsMat]
Albedo = White
Pipeline = 6
CastShadows = true

; ==========================================================
; LIGHTING
; ==========================================================

[Entity]
[Tag]
Name = SunLight
[Transform]
Position = 5.0 20.0 5.0
[LightComponent]
Color = 1.0 1.0 1.0
Intensity = 80.0
Range = 200.0

; ==========================================================
; COLLISION SURFACES
; ==========================================================

; --- WorldFloor: axis-aligned floor at y=0 ---
; Catches Q1 MovingBallQ1 (if it falls past FixedSphereQ1)
; and all three Q5 elasticity balls.
[Entity:WorldFloor]
[Tag]
Name = WorldFloor
[Transform]
Position = 0.0 0.0 0.0
[PlaneCollider]
Normal = 0.0 1.0 0.0
Offset = 0.0
[MeshRenderer]
Type = procedural
Shape = Plane
Width = 50.0
Depth = 50.0
Material = PhysicsMat

; --- TiltedRamp: 30-degree inclined plane for Q1 Test 2 ---
; Plane equation: -0.5x + 0.866y = 0 (passes through origin)
; RampBallQ1 centre reaches the plane surface at y ≈ 4.04 when x=5.
[Entity:TiltedRampQ1]
[Tag]
Name = TiltedRampQ1
[Transform]
Position = 2.5 2.0 0.0
Rotation = 0.0 0.0 30.0
[PlaneCollider]
Normal = -0.5 0.866 0.0
Offset = 0.0
[MeshRenderer]
Type = procedural
Shape = Plane
Width = 14.0
Depth = 10.0
Material = PhysicsMat

; ==========================================================
; Q1 TEST 1 — MovingBall vs Fixed Sphere (horizontal approach)
; ==========================================================
; FixedSphereQ1 has infinite effective mass (isStatic=true).
; MovingBallQ1 travels in +Z, strikes the static sphere, and
; bounces back along the collision normal.
; Expected: static sphere does not move; MovingBallQ1 reflects.

[Entity:FixedSphereQ1]
[Tag]
Name = FixedSphereQ1
[Transform]
Position = -8.0 1.0 5.0
[RigidBody]
Mass = 1.0
Static = true
UseGravity = false
Restitution = 0.8
[SphereCollider]
Radius = 1.0
[MeshRenderer]
Type = procedural
Shape = Sphere
Material = PhysicsMat

[Entity:MovingBallQ1]
[Tag]
Name = MovingBallQ1
[Transform]
Position = -8.0 1.0 -5.0
[RigidBody]
Mass = 1.0
Static = false
UseGravity = true
Restitution = 0.8
Velocity = 0.0 0.0 3.0
[SphereCollider]
Radius = 1.0
[MeshRenderer]
Type = procedural
Shape = Sphere
Material = PhysicsMat

; ==========================================================
; Q1 TEST 2 — Ball vs Tilted Ramp (angled plane normal)
; ==========================================================
; RampBallQ1 falls under gravity with initial x-velocity 1.5 m/s.
; It strikes TiltedRampQ1 (normal = -0.5, 0.866, 0).
; Bounce direction follows the plane normal — not world-up.
; Demonstrates that impulse = -2 * (v·n) * n for e=0.7.

[Entity:RampBallQ1]
[Tag]
Name = RampBallQ1
[Transform]
Position = 5.0 12.0 0.0
[RigidBody]
Mass = 1.0
Static = false
UseGravity = true
Restitution = 0.7
Velocity = 1.5 0.0 0.0
[SphereCollider]
Radius = 1.0
[MeshRenderer]
Type = procedural
Shape = Sphere
Material = PhysicsMat

; ==========================================================
; Q5 — ELASTICITY DEMO: three balls, same height, three e values
; ==========================================================
; All three balls drop from y=12 onto WorldFloor (y=0).
; e=0.00 → hits floor and stops (no kinetic energy preserved).
; e=0.50 → bounces to 25% of drop height (KE_post = e^2 * KE_pre).
; e=1.00 → returns to full drop height (energy conserved).
; Use the "Override Restitution (Q5)" slider to override all e values live.

[Entity:Ball_e00]
[Tag]
Name = Ball_e00
[Transform]
Position = 10.0 12.0 0.0
[RigidBody]
Mass = 1.0
Static = false
UseGravity = true
Restitution = 0.0
Velocity = 0.0 0.0 0.0
[SphereCollider]
Radius = 1.0
[MeshRenderer]
Type = procedural
Shape = Sphere
Material = PhysicsMat

[Entity:Ball_e05]
[Tag]
