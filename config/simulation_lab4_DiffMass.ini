[RigidBody]
Mass = 5.0
Static = false
UseGravity = false
Restitution = 1.0
Velocity = 0.0 0.0 0.0
[SphereCollider]
Radius = 1.0
[MeshRenderer]
Type = procedural
Shape = Sphere
