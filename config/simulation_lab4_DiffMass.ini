; ==========================================================
; SIMULATION LAB 4: COLLISION RESPONSE — Q3 DIFFERENT-MASS COLLISIONS
; ==========================================================
;
; All bodies: radius=1, gravity=false (pure horizontal collisions).
; Balls float at y=1 for clean side-view observation.
;
; Test 1 — Heavy hits Light (m=5 → m=1):
;   HeavyA (m=5) travelling in +X strikes stationary LightA (m=1).
;   Heavy ball barely slows; light ball launches ~5× faster.
;   Analytical (e=1): invMassSum=1.2, j=5; Δv_H=1 m/s, Δv_L=5 m/s.
;   HeavyA: 3 → 2 m/s.  LightA: 0 → 5 m/s.
;
; Test 2 — Light hits Heavy (m=1 → m=5):
;   LightB (m=1) travelling in -Z strikes stationary HeavyB (m=5).
;   Light ball bounces back; heavy ball is barely nudged.
;   Analytical (e=1): j=6.67; LightB: -4 → +2.67 m/s (reverses); HeavyB: 0 → -1.33 m/s.
;
; Test 3 — Both moving, unequal masses (m=3 vs m=1):
;   MedBall (m=3, +Z) meets SmallBall (m=1, -Z).
;   Analytical (e=1): totalInvMass=4/3, vRel_dot_n=-5, j=7.5;
;   MedBall slows to vz=0.5; SmallBall reverses to vz=5.5.

; --- Resource Registry ---
[Texture:White]
Path = ./textures/white.png
[Texture:Black]
Path = ./textures/black.png
[Texture:Placeholder]
Path = ./textures/matte_rough.png
[Texture:Matte]
Path = ./textures/matte_rough.png

; --- Material ---
[Material:PhysicsMat]
Albedo = White
Pipeline = 6
CastShadows = true

; ==========================================================
; LIGHTING
; ==========================================================

[Entity]
[Tag]
Name = SunLight
[Transform]
Position = 5.0 20.0 5.0
[LightComponent]
Color = 1.0 1.0 1.0
Intensity = 80.0
Range = 200.0

; ==========================================================
; VISUAL FLOOR (no gravity interaction — purely for reference)
; ==========================================================

[Entity:WorldFloor]
[Tag]
Name = WorldFloor
[Transform]
Position = 0.0 0.0 0.0
[PlaneCollider]
Normal = 0.0 1.0 0.0
Offset = 0.0
[MeshRenderer]
Type = procedural
Shape = Plane
Width = 70.0
Depth = 40.0
Material = PhysicsMat

; ==========================================================
; Q3 TEST 1 — Heavy hits Light  (mA=5, mB=1)
; ==========================================================
; HeavyA travels in +X at 3 m/s; LightA starts at rest.
; Expected (e=1): HeavyA → 2 m/s, LightA → 5 m/s.
; Qualitative: heavy barely slows; light launches noticeably faster.

[Entity:HeavyA]
[Tag]
Name = HeavyA
[Transform]
Position = -10.0 1.0 0.0
[RigidBody]
Mass = 5.0
Static = false
UseGravity = false
Restitution = 1.0
Velocity = 3.0 0.0 0.0
[SphereCollider]
Radius = 1.0
[MeshRenderer]
Type = procedural
Shape = Sphere
Material = PhysicsMat

[Entity:LightA]
[Tag]
Name = LightA
[Transform]
Position = 0.0 1.0 0.0
[RigidBody]
Mass = 1.0
Static = false
UseGravity = false
Restitution = 1.0
Velocity = 0.0 0.0 0.0
[SphereCollider]
Radius = 1.0
[MeshRenderer]
Type = procedural
Shape = Sphere
Material = PhysicsMat

