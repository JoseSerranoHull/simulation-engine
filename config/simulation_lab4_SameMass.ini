; ==========================================================
; SIMULATION LAB 4: COLLISION RESPONSE — Q2 SAME-MASS COLLISIONS
; ==========================================================
;
; All bodies: mass=1, radius=1, gravity=false (pure horizontal collisions).
; Restitution=0.9 for a near-elastic result.
; Balls float at y=1 for unobstructed side-view observation.
;
; Test 1 — Head-on, one moving:
;   BallA travels in +Z toward stationary BallB.
;   Near-equal-mass elastic swap: BallA nearly stops; BallB launches at ~3.8 m/s.
;   (Exact swap only for e=1.0; with e=0.9 BallA retains ~0.2 m/s.)
;
; Test 2 — Head-on, both moving opposite directions:
;   BallC (+Z) meets BallD (-Z). Equal-and-opposite velocities swap:
;   each ball reverses direction and recedes at near-original speed.
;
; Test 3 — Glancing collision:
;   BallE moves in +X. BallF is offset 1.2 units in Z.
;   Collision normal n ≈ (−0.8, 0, −0.6) (computed from geometry at impact).
;   BallE deflects off-axis; BallF launches diagonally.

; --- Resource Registry ---
[Texture:White]
Path = ./textures/white.png
[Texture:Black]
Path = ./textures/black.png
[Texture:Placeholder]
Path = ./textures/matte_rough.png
[Texture:Matte]
Path = ./textures/matte_rough.png

; --- Material ---
[Material:PhysicsMat]
Albedo = White
Pipeline = 6
CastShadows = true

; ==========================================================
; LIGHTING
; ==========================================================

[Entity]
[Tag]
Name = SunLight
[Transform]
Position = 5.0 20.0 5.0
[LightComponent]
Color = 1.0 1.0 1.0
Intensity = 80.0
Range = 200.0

; ==========================================================
; VISUAL FLOOR (no gravity interaction — purely for reference)
; ==========================================================

[Entity:WorldFloor]
[Tag]
Name = WorldFloor
[Transform]
Position = 0.0 0.0 0.0
[PlaneCollider]
Normal = 0.0 1.0 0.0
Offset = 0.0
[MeshRenderer]
Type = procedural
Shape = Plane
Width = 60.0
Depth = 60.0
Material = PhysicsMat

; ==========================================================
; Q2 TEST 1 — Head-on: one moving, one stationary
; ==========================================================
; BallA travels in +Z at 4 m/s toward stationary BallB.
; For e≈1: velocities swap. BallA stops; BallB launches at 4 m/s.
; With e=0.9: BallA ends at ~0.2 m/s; BallB at ~3.8 m/s.

[Entity:BallA]
[Tag]
Name = BallA
[Transform]
Position = 0.0 1.0 -8.0
[RigidBody]
Mass = 1.0
Static = false
UseGravity = false
Restitution = 0.9
Velocity = 0.0 0.0 4.0
[SphereCollider]
Radius = 1.0
[MeshRenderer]
Type = procedural
Shape = Sphere
Material = PhysicsMat

[Entity:BallB]
[Tag]
Name = BallB
[Transform]
Position = 0.0 1.0 0.0
[RigidBody]
Mass = 1.0
Static = false
UseGravity = false
Restitution = 0.9
Velocity = 0.0 0.0 0.0
[SphereCollider]
Radius = 1.0
[MeshRenderer]
Type = procedural
Shape = Sphere
Material = PhysicsMat

; ==========================================================
; Q2 TEST 2 — Head-on: both moving in opposite directions
; ==========================================================
; BallC (+Z) and BallD (-Z) approach each other at equal speeds.
; After collision: each ball reverses direction at near-original speed.
; Analytical (e=1, equal mass): velocities swap → each exits in opposite direction.

[Entity:BallC]
[Tag]
Name = BallC
[Transform]
Position = 12.0 1.0 -6.0
[RigidBody]
Mass = 1.0
Static = false
UseGravity = false
Restitution = 0.9
Velocity = 0.0 0.0 3.0
[SphereCollider]
Radius = 1.0
[MeshRenderer]
Type = procedural
Shape = Sphere
Material = PhysicsMat

[Entity:BallD]
[Tag]
Name = BallD
[Transform]
Position = 12.0 1.0 6.0
[RigidBody]
Mass = 1.0
Static = false
UseGravity = false
Restitution = 0.9
Velocity = 0.0 0.0 -3.0
[SphereCollider]
Radius = 1.0
[MeshRenderer]
Type = procedural
Shape = Sphere
Material = PhysicsMat

; ==========================================================
; Q2 TEST 3 — Glancing collision
; ==========================================================
; BallE moves in +X. BallF is offset 1.2 units in Z.
; At impact the centres are separated by distance=2 along
; n ≈ (−0.8, 0, −0.6) — not the +X axis.
; Post-collision: BallE deflects; BallF launches diagonally.
; This shows impulse acts along the line of centres, not along v.

[Entity:BallE]
[Tag]
Name = BallE
[Transform]
Position = -10.0 1.0 0.0
[RigidBody]
Mass = 1.0
Static = false
UseGravity = false
Restitution = 0.9
Velocity = 5.0 0.0 0.0
[SphereCollider]
Radius = 1.0
[MeshRenderer]
Type = procedural
Shape = Sphere
Material = PhysicsMat

[Entity:BallF]
[Tag]
Name = BallF
[Transform]
Position = 0.0 1.0 1.2
[RigidBody]
Mass = 1.0
Static = false
UseGravity = false
Restitution = 0.9
Velocity = 0.0 0.0 0.0
[SphereCollider]
Radius = 1.0
[MeshRenderer]
Type = procedural
Shape = Sphere
Material = PhysicsMat
