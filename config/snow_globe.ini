; --- 2. MATERIAL REGISTRY ---

[Material:Mat_Sand]
Albedo = Sand_Col
Normal = Sand_Nrm
Metallic = White
Roughness = White
Pipeline = 1
Pass = Opaque
CastShadows = false

[Material:Mat_Base]
Albedo = Rattan_Col
Normal = Rattan_Nrm
AO = Rattan_AO
Pipeline = 2
Pass = Opaque
CastShadows = false

[Material:Mat_Cactus]
