; --- 3. ENTITY DEFINITIONS ---

; 3.1 Global Skybox
[Entity]
[Tag]
Name = WorldSkybox
[SkyboxComponent]
Enabled = true
PX = Sky_PX
NX = Sky_NX
PY = Sky_PY
NY = Sky_NY
PZ = Sky_PZ
NZ = Sky_NZ

; 3.2 Main Lighting
[Entity]
[Tag]
Name = MainSun
[Transform]
Position = 0.0 5.0 2.0
[LightComponent]
Color = 1.0 0.95 0.85
Intensity = 2.5
IsStatic = false

; 3.3 GLOBE BASE
[Entity]
[Tag]
Name = GlobeBase
[Transform]
Position = 0.0 -0.9 0.0
[MeshRenderer]
Type = procedural
Shape = Cylinder
Segments = 64
BottomRadius = 2.4
TopRadius = 1.75
Height = 0.8
Material = Mat_Base

; 3.4 Procedural Sand Plug
[Entity]
[Tag]
Name = ProceduralSand
[Transform]
Parent = GlobeBase
Position = 0.0 0.8 0.0
[MeshRenderer]
Type = procedural
Shape = Plug
Segments = 64
RimRadius = 1.78
BowlRadius = 1.8
Depth = 0.4
Material = Mat_Sand
; 3.5 The Desert Queen (Sorceress)
[Entity]
[Tag]
Name = DesertQueen
[Transform]
Parent = ProceduralSand
Position = 0.0 0.6 0.0
Scale = 0.005 0.005 0.005
[MeshRenderer]
Mesh = ./models/sorceress/Pose_Body.obj
Material = Mat_SorcBody
MaterialMap = Tiles_low:EXCLUDE,Skirt:Mat_SorcSkirt,Book:Mat_SorcBook,Sphere_low:Mat_SorcOrb,Object003:Mat_SorcOrb,Effects:Mat_SorcOrb
