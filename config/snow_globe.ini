; 3.10 Agnostic Particle Emitters
[Entity]
[Tag]
Name = AmbientDust
[Transform]
Parent = ProceduralSand
Position = 0.0 1.0 0.0
[ParticleComponent]
Type = Dust
ComputeShader = ./shaders/dust_comp.spv
VertexShader  = ./shaders/dust_vert.spv
FragmentShader = ./shaders/dust_frag.spv
Enabled = true

[Entity]
[Tag]
Name = BonfireFire
[Transform]
Parent = Cactus1
Position = 0.0 0.0 0.0
[ParticleComponent]
Type = Fire
ComputeShader = ./shaders/fire_comp.spv
VertexShader  = ./shaders/fire_vert.spv
FragmentShader = ./shaders/fire_frag.spv
Enabled = true
MaxParticles = 500

[Entity]
[Tag]
Name = BonfireSmoke
[Transform]
Parent = BonfireFire
Position = 0.0 0.0 0.0
[ParticleComponent]
Type = Smoke
ComputeShader = ./shaders/smoke_comp.spv
VertexShader = ./shaders/smoke_vert.spv
FragmentShader = ./shaders/smoke_frag.spv
Enabled = true
MaxParticles = 250

[Entity]
[Tag]
Name = SnowParticleSystem
[Transform]
Position = 0.0 5.0 0.0
[ParticleComponent]
Type = Snow
ComputeShader = ./shaders/snow_comp.spv
VertexShader  = ./shaders/snow_vert.spv
FragmentShader = ./shaders/snow_frag.spv
Enabled = false

[Entity]
[Tag]
Name = RainParticleSystem
[Transform]
Position = 0.0 5.0 0.0
[ParticleComponent]
Type = Rain
ComputeShader = ./shaders/rain_comp.spv
VertexShader  = ./shaders/rain_vert.spv
FragmentShader = ./shaders/rain_frag.spv
Enabled = false

